# This is a basic workflow to help you get started with Actions
name: gh-deploy

on:
  push:
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    name: MkDocs Github Pages automatic deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main          # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        uses: actions/checkout@v2

      - name: Set up Python 3
        uses: actions/setup-python@v2
        with:
          python-version: '3'

      - name: MkDocs gh-deploy
        run: |
          pip install mkdocs mkdocstrings[python]>=0.18 mkdocs-jupyter 
          pip install git+https://github.com/thangckt/mkdocs-material.git@tabs_in_header_thang    # tabs_in_header_yinkh   tabs_in_header_thang
          mkdocs gh-deploy --force --clean --verbose



