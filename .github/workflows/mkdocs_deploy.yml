# This is a basic workflow to help you get started with Actions
name: gh-deploy

on:
  push:
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    name: MkDocs Github Pages automatic deployment
    runs-on: ubuntu-latest   # ubuntu-latest
    steps:
      - name: Checkout main          # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        uses: actions/checkout@v3

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs mkdocstrings[python]>=0.18 mkdocs-jupyter 
          python -m pip install git+https://github.com/thangckt/mkdocs-material.git@tabs_header_yinkh        # tabs_header_yinkh   tabs_header_thang  thang_master thang_header

      - name: MkDocs gh-deploy
        run: |
          mkdocs gh-deploy --force --verbose


