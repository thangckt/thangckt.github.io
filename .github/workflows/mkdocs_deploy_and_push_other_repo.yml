# This is a basic workflow to help you get started with Actions
name: gh-deploy

on:
  push:
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    name: MkDocs Github Pages automatic deployment
    runs-on: ubuntu-latest   # ubuntu-latest
    steps:
      - name: Checkout main          # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        uses: actions/checkout@v3

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs mkdocstrings[python]>=0.18 mkdocs-jupyter 
          python -m pip install git+https://github.com/thangckt/mkdocs-material.git@thang_master_v9        # tabs_header_yinkh   tabs_header_thang  thang_master thang_master_v9

      - name: MkDocs gh-deploy    # This will create `gh-pages` branch contain `mkdocs-site`
        run: |
          mkdocs gh-deploy --force --verbose


      - name: Push to another repository  # This step to copy a folder and push to another repo
        id: push_directory
        uses: thangckt/github-action-push-to-another-repository@main    #  cpina/github-action-push-to-another-repository@main   # use workflow `action.yml` in this repo
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        with:
          source-directory: './'
          destination-github-username: 'thangckt'
          destination-repository-name: 'thangckt.github.io'
          user-email: thangckt@gmail.com
          commit-message: See ORIGIN_COMMIT from $GITHUB_REF
          target-branch: gh-pages        # push branch `gh-pages` from `source-repo` to `destination-repo` 