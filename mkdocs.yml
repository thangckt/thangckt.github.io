## Configuration
theme:
  name: "material"     #  "material"    "mkdocs"    "readthedocs"     'rtd-dropdown'   windmill  bootswatch
  logo: 1images/monkey.png               # Phoenix8    one-note-128-o.png        my_picture3x3.jpg   Eagle4
  favicon: 1images/monkey.png   
  highlightjs: true
  features:
    - content.code.annotate
    - navigation.expand
    # - navigation.sections
    - navigation.indexes
    # - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - toc.follow
    # - toc.integrate 
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tabs.header   # only in extended theme
    
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey   #  blue grey, indigo
      accent: indigo
      toggle:
        icon: material/eye
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey   #  blue grey, indigo
      accent: indigo
      toggle:
        icon: material/eye-outline
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono


## Plugins
plugins:
  # - meta    # only insider
  # - blog
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            members_order: 'source'
            docstring_style: 'google'
            show_source: false 
            show_root_heading: true
            show_category_heading: false
            show_signature_annotations: true
            # docstring_section_style: list
          # path: [.]
          # import:
          #   - https://docs.python.org/3/objects.inv
          #   - https://mkdocstrings.github.io/autorefs/objects.inv


