## Configuration
theme:
  name: material     #  "material"    "mkdocs"    "readthedocs"     'rtd-dropdown'   windmill  bootswatch
  custom_dir: docs_site/_overrides
  logo: 1images/one-note-128-o.png            # one-note-128-o.png        my_picture3x3.jpg    one-note-128-y.png  snake1  monkey
  favicon: 1images/one-note-128-o.png
  highlightjs: true
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.expand
    # - navigation.sections
    - navigation.indexes
    # - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - toc.follow
    # - toc.integrate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tabs.header   # only in extended theme
    ### new in v9
    - content.action.edit
    - navigation.footer

  palette:
    scheme: slate

    # Palette toggle for light mode
    # - media: "(prefers-color-scheme: light)"
      # scheme: default
      # primary: blue grey   #  blue grey, indigo
      # accent: indigo
      # toggle:
      #   icon: material/lightbulb
      #   name: Switch to dark mode
    # Palette toggle for dark mode
    # - media: "(prefers-color-scheme: dark)"
      # scheme: slate
      # primary: blue grey   #  blue grey, indigo
      # accent: indigo
      # toggle:
      #   icon: material/lightbulb-outline
      #   name: Switch to light mode

  font:
    text: Roboto
    code: Roboto Mono

### Extra theme
extra_javascript:
  - _extend_theme/extra_js/gg_adsense.js
extra_css:
  - _extend_theme/extra_css/full_width.css
  - _extend_theme/extra_css/font_size.css


