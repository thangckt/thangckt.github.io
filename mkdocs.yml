## Extensions
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.caret
  - pymdownx.details
  - codehilite
  - abbr
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.emoji:
      emoji_generator: !!python/name:materialx.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

## Plugins
plugins:
  # - meta    # only insider
  - blog:      # only insider
      blog_toc: true
      # post_dir: "{blog}/posts"

  - search
  - autorefs
  # - mkdocs-jupyter:          # not work with tab_header_v8 branch
  #     theme: dark
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_category_heading: false
            show_symbol_type_heading: true
            show_source: false
            show_signature_annotations: true
            members_order: 'source'
            show_submodules: true
            docstring_style: 'google'      # google, numpy, sphinx
            docstring_section_style: 'list'  # 'table', 'list', 'spacy'
          # path: [.]
          # import:
          #   - https://docs.python.org/3/objects.inv
          #   - https://mkdocstrings.github.io/autorefs/objects.inv
  # - enumerate-headings

  # - blogging:   # https://github.com/liang2kl/mkdocs-blogging-plugin
